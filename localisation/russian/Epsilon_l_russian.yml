 GER_inspection_in_air:0 "Назначить инспектора авиационной промышленности"
 GER_overmobilized_industry:0 "Промышленное чудо Шпеера"
 GER_centralized_planning:0 "Создать управление по централизованному планированию"
 GER_Deutsche_Arbeitsfront:0 "Германский трудовой фронт"
 GER_nationalized_war_industry:0 "Национализировать военную промышленность"
 GER_steel_industry:0 "Развить сталелитейную промышленность"
 SOV_stalingrad_defence:0 "Укрепить Сталинград"
 SOV_stalingrad_defence_desc:0 "В своей новой летней компании Вермахт устремил взгляд на южное крыло фронта.. Нам необходимо тчательно подготовить оборону такого стратегически важного города, как Сталинград, чтобы предотвратить возможную катастрофу."
 JAP_secure_china:0 "Интегрировать Китайскую промышленность"
 USA_convoy_tactics:0 "Борьба с подводными лодками"
 USA_militarized_WPA:0 "Милитаризировать УОР"
 USA_Ford:0 "Сотрудничество с компанией Ford"
 USA_wartime_industry:0 "Ограниченное перевооружение"
 USA_war_plan_haski:0 "Подготовить операцию Хаски"
