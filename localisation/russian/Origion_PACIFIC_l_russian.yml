l_russian:

#Ивенты

origion_pacific.1.t: "Подготовка к войне"
origion_pacific.1.d: "Нам поступило сообщение о приближающейся войне с Японией"
origion_pacific.1.a: "Придётся подготовиться"

origion_pacific.2.t: "Война на Тихом океане"
origion_pacific.2.d: "После множества месяцев напряженной дипломатической борьбы и растущего напряжения на Тихом океане, события достигли своей кульминации. Япония, стремясь расширить свою империю и обеспечить доступ к важным ресурсам Юго-Восточной Азии, осуществила внезапное нападение на военно-морскую базу Пёрл-Харбор. Это нападение стало решающим моментом, которое втянуло Соединенные Штаты Америки в глобальный конфликт. Мир оказался на пороге новой эры войны."
origion_pacific.2.a: "Так уж и быть"

origion_pacific.3.t: "Мы захватили вражеский регион"
origion_pacific.3.d: ""
origion_pacific.3.a: "Круто"

origion_pacific.4.t: "Враг захватил наш регион"
origion_pacific.4.d: ""
origion_pacific.4.a: "Не круто"

origion_pacific.5.t: "Выбор главы генштаба"
origion_pacific.5.d: "Мы можем выбрать главу генштаба который будет выбирать время для начала операций на Тихоокеанском театре."
origion_pacific.5.a: "США"
origion_pacific.5.b: "Австралия"
origion_pacific.5.c: "Канада"
origion_pacific.5.d: "Индия"
origion_pacific.5.e: "Южная Африка"
origion_pacific.5.f: "Оставить как есть"

origion_pacific.6.t: "О том как работает Тихоокеанский фронт"
origion_pacific.6.d: "На карте указаны стратегические регионы, захват которых будет давать бонус своей стороне и дебаф другой. \nСо старта войны §CСоюзники§! имеют под контролем 11 регионов, а §RЯпония§! 9 (компенсируется это тем что мейн и Китай не считаются стратегическими регионами и их нельзя захватить).\n\nДля захвата региона необходимо контроллировать все провинции которые в него входят. \nКол-во контроллируемых регионов напрямую влияет на модификаторы США и Японии, а также важно для открытия некоторых фокусов и особенно §RОперации "Оверлорд"§!."
origion_pacific.6.a: "Понятно"

