#Идеи

USA_JAP_debuff_name: "Приоритетный фронт в Азии"
USA_JAP_debuff_name_desc: "Бонус к атаке и защите против §YГермании§! и против §YИталии§! изменяется в зависимости от колличества §Yконтроллируемых Японией регионов§!: \n\n§Y<9§! - отсутствие дебафа \n§Y9-12§! - §R-10%§! против §YГермании§! и §R-5%§! против §YИталии§! \n§Y13-14§! - §R-20%§! против §YГермании§! и §R-10%§! против §YИталии§! \n§Y15-16§! - §R-30%§! против §YГермании§! и §R-15%§! против §YИталии§! \n§Y17-18§! - §R-40%§! против §YГермании§! и §R-20%§! против §YИталии§! \n§Y19-20§! - §R-50%§! против §YГермании§! и §R-25%§! против §YИталии§!"

#Ивенты

origion_pacific.1.t: "Подготовка к войне"
origion_pacific.1.d: "Нам поступило сообщение о приближающейся войне с Японией"
origion_pacific.1.a: "Придётся подготовиться"

origion_pacific.2.t: "Война на Тихом океане"
origion_pacific.2.d: "После множества месяцев напряженной дипломатической борьбы и растущего напряжения на Тихом океане, события достигли своей кульминации. Япония, стремясь расширить свою империю и обеспечить доступ к важным ресурсам Юго-Восточной Азии, осуществила внезапное нападение на военно-морскую базу Пёрл-Харбор. Это нападение стало решающим моментом, которое втянуло Соединенные Штаты Америки в глобальный конфликт. Мир оказался на пороге новой эры войны."
origion_pacific.2.a: "Так уж и быть"

origion_pacific.6.t: "О том как работает Тихоокеанский фронт"
origion_pacific.6.d: "На карте указаны стратегические регионы, захват которых будет давать бонус своей стороне и дебаф другой. \nСо старта войны §CСоюзники§! имеют под контролем 11 регионов, а §RЯпония§! 9 (компенсируется это тем что мейн и Китай не считаются стратегическими регионами и их нельзя захватить).\n\nДля захвата региона необходимо контроллировать все провинции которые в него входят. \nКол-во контроллируемых регионов напрямую влияет на модификаторы США и Японии, а также важно для открытия некоторых фокусов и особенно §RОперации "Оверлорд"§!."
origion_pacific.6.a: "Понятно"

origion_pacific.7.t: "Падение Окинавы"
origion_pacific.7.d: "После ожесточенных боев, продолжавшихся несколько месяцев, американские войска одержали решающую победу в битве за Окинаву — последний крупный остров Японского архипелага, который оставался под контролем японских сил. Окинава, расположенная всего в 500 километрах от главных японских островов, стала ключевым стратегическим пунктом для США на пути к завершению войны. Бои за остров отличались невероятной жестокостью: японская армия применяла отчаянную оборону, используя как укрепленные позиции, так и kamikaze-атаки на американские корабли. Несмотря на масштабные потери, американцы смогли одержать победу, захватив остров, который предоставил им ключевые базы для дальнейших операций в Тихом океане. Потери с обеих сторон были колоссальны, но победа на Окинаве окончательно приближала Японию к капитуляции."
origion_pacific.7.a: "Понятно"
origion_pacific.7.b: "Крайне печально"

origion_pacific.8.t: "Падение Иводзимы"
origion_pacific.8.d: "Американские войска одержали важнейшую победу в битве за Иводзиму — стратегически значимый остров в Тихом океане, расположенный всего в нескольких сотнях километров от Японских островов. Иводзима была ключевой точкой для дальнейших операций США в регионе, и ее захват стал решающим шагом на пути к финальной победе над Японией. После нескольких недель ожесточенных боев, американцы, несмотря на непрерывное и жестокое сопротивление японских войск, смогли прорвать оборону и взять остров под контроль. Эта победа далась ценой огромных потерь, как для США, так и для Японии, но в стратегическом плане она существенно ослабила японскую оборону и открыла путь к наступлению на другие важные острова в Тихом океане."
origion_pacific.8.a: "Понятно"
origion_pacific.8.b: "Крайне печально"

origion_pacific.9.t: "Операция "Downfall""
origion_pacific.9.d: "Союзные силы готовятся к началу операции "Downfall" — решающей высадке на японских островах. Операция разделена на две фазы: захват Кюсю (Операция Олимпик) и высадка на Хонсю с целью захвата Токио (Операция Корона). Ожидается, что операция приведет к огромным потерям с обеих сторон. \nПараллельно продолжаются дипломатические усилия, чтобы убедить Японию капитулировать до начала высадки. Внутренние дебаты о целесообразности операции нарастают, так как союзники готовятся к масштабным жертвам."
origion_pacific.9.a: "Понятно"
origion_pacific.9.b: "Ужас"

